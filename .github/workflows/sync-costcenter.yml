name: Sync_EntTeam_Cost_Center

on:
  workflow_dispatch:
  schedule:
    - cron: "0 2 * * *" # daily at 02:00 UTC (change as needed)

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests python-dotenv

      - name: Run sync
        env:
          # GITHUB_API_BASE: ${{ secrets.GITHUB_API_BASE }} # optional; can omit if using api.github.com
          GITHUB_ENTERPRISE: ${{ secrets.ENTERPRISE }}
          GITHUB_TOKEN: ${{ secrets.TOKEN }}
          # ---------------------------------------------------------------------------
          # Multi-cost-center mode (recommended when you have overlapping team members)
          #
          # Set the COST_CENTER_MAPPINGS secret to a JSON array where each entry maps
          # an enterprise team to the cost center it should populate.  Entries are
          # processed in order – users claimed by an earlier entry are NOT added to
          # later ones, so list higher-priority cost centers first.
          #
          # Example value for secret COST_CENTER_MAPPINGS:
          #   [
          #     {"team_slug": "pr1-team",   "cost_center_id": "<PR1-uuid>"},
          #     {"team_slug": "march-team", "cost_center_id": "<MarchCC-uuid>"}
          #   ]
          #
          # Because GitHub cost centers have exclusive membership (a user can only
          # belong to one cost center at a time), placing PR1 first ensures its 3
          # users stay in PR1 and are not re-assigned to MarchCC.
          COST_CENTER_MAPPINGS: ${{ secrets.COST_CENTER_MAPPINGS }}
          # ---------------------------------------------------------------------------
          # Single cost-center mode (backward-compatible; used when COST_CENTER_MAPPINGS
          # is not set)
          GITHUB_TEAM_SLUG: ${{ secrets.TEAM_SLUG }}
          GITHUB_COST_CENTER_ID: ${{ secrets.COST_CENTER_ID }}
          # OUTPUT_CSV: synced_users.csv
        run: |
          python new_sync.py

      - name: Upload report
        uses: actions/upload-artifact@v4
        with:
          name: synced-users-report
          path: synced_users.csv
