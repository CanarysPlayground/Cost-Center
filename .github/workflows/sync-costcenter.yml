name: Sync_EntTeam_Cost_Center

on:
  workflow_dispatch:
  schedule:
    - cron: "0 2 * * *" # daily at 02:00 UTC (change as needed)

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests python-dotenv

      - name: Run sync
        env:
          # GITHUB_API_BASE: ${{ secrets.GITHUB_API_BASE }} # optional; can omit if using api.github.com
          GITHUB_ENTERPRISE: ${{ secrets.ENTERPRISE }}
          GITHUB_TOKEN: ${{ secrets.TOKEN }}
          # ---------------------------------------------------------------------------
          # Multi-cost-center mode (recommended when you have overlapping team members)
          #
          # Set the COST_CENTER_MAPPINGS secret to a JSON array.  Each entry maps a
          # user source to a cost center.  Entries are processed in order – users
          # claimed by an earlier entry are NOT added to later ones, so list
          # higher-priority cost centers first.
          #
          # Each entry must have 'cost_center_id' plus ONE of:
          #   • "team_slug" – resolve members from an enterprise team (API call)
          #   • "users"     – explicit list of GitHub logins (no team required)
          #
          # Example: PR1 gets 3 specific users (no enterprise team needed);
          #          MarchCC gets the rest via its enterprise team.
          #
          #   [
          #     {
          #       "users":          ["user1", "user2", "user3"],
          #       "cost_center_id": "<PR1-uuid>"
          #     },
          #     {
          #       "team_slug":      "march-team",
          #       "cost_center_id": "<MarchCC-uuid>"
          #     }
          #   ]
          #
          # Because PR1 is listed first, its 3 users are claimed and will NOT be
          # re-assigned to MarchCC when the march-team mapping runs.
          COST_CENTER_MAPPINGS: ${{ secrets.COST_CENTER_MAPPINGS }}
          # ---------------------------------------------------------------------------
          # Single cost-center mode (backward-compatible; used when COST_CENTER_MAPPINGS
          # is not set)
          GITHUB_TEAM_SLUG: ${{ secrets.TEAM_SLUG }}
          GITHUB_COST_CENTER_ID: ${{ secrets.COST_CENTER_ID }}
          # OUTPUT_CSV: synced_users.csv
        run: |
          python new_sync.py

      - name: Upload report
        uses: actions/upload-artifact@v4
        with:
          name: synced-users-report
          path: synced_users.csv
